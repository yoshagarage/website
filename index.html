<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <meta name="theme-color" content="#54A9DE">
  <title>Yōsha Garage ★ 西洋車ガレージ</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/style-a.css">
  <link rel="stylesheet" href="css/style-b.css">
</head>
<body class="style-a">

  <header class="site-header">
    <img src="assets/images/logo.png" alt="Yōsha Garage 西洋車ガレージ" class="logo">
    <div class="subtitle">★ AUTOMOTIVE ACCESSORIES ★</div>
  </header>

  <div class="marquee-wrap">
    <div class="marquee-inner">
      ★★★ Welcome to Yōsha Garage ★ ようこそ、西洋車ガレージ ★★★
    </div>
  </div>

  <hr>

  <div class="construction">
    ◆ ～ UNDER CONSTRUCTION ～ ◆ 工事中 ◆
  </div>

  <hr>

  <div class="toolbar">
    <div class="filter-group">
      <span class="filter-label">Category:</span>
      <div class="filter-options" id="categoryFilters"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Vehicle:</span>
      <div class="filter-options" id="brandFilters"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Sort:</span>
      <select class="sort-select" id="sortSelect">
        <option value="added-desc">Date, new to old</option>
        <option value="added-asc">Date, old to new</option>
        <option value="price-asc">Price, low to high</option>
        <option value="price-desc">Price, high to low</option>
        <option value="name-asc">Name, A to Z</option>
        <option value="name-desc">Name, Z to A</option>
      </select>
    </div>
  </div>

  <section class="products" id="productGrid">
    <div class="no-results" id="noResults" style="display:none;">該当する商品がありません ★ No products match your filters</div>
  </section>

  <hr>

  <footer class="site-footer">
    <div>© 2026 Yōsha Garage ★ All Rights Reserved</div>
    <div class="visitor-counter">VISITORS: <span id="vc">0</span></div>
  </footer>

  <script src="js/products-data.js"></script>
  <script src="js/product-images.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
