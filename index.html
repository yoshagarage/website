<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Yōsha Garage ★ 西洋車ガレージ</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/style-a.css">
  <link rel="stylesheet" href="css/style-b.css">
</head>
<body class="style-a">

  <header class="site-header">
    <img src="assets/images/logo.png" alt="Yōsha Garage 西洋車ガレージ" class="logo">
    <div class="subtitle">★ AUTOMOTIVE ACCESSORIES ★</div>
  </header>

  <div class="marquee-wrap">
    <div class="marquee-inner">
      ★★★ Welcome to Yōsha Garage ★ ようこそ、西洋車ガレージ ★★★
    </div>
  </div>

  <hr>

  <div class="construction">
    ◆ ～ UNDER CONSTRUCTION ～ ◆ 工事中 ◆
  </div>

  <hr>

  <div class="toolbar">
    <div class="filter-group">
      <span class="filter-label">カテゴリ:</span>
      <div class="filter-options" id="categoryFilters"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">車種:</span>
      <div class="filter-options" id="brandFilters"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">並べ替え:</span>
      <select class="sort-select" id="sortSelect">
        <option value="added-desc">Date Added ↓</option>
        <option value="added-asc">Date Added ↑</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
      </select>
    </div>
  </div>

  <section class="products" id="productGrid">
    <div class="no-results" id="noResults" style="display:none;">該当する商品がありません ★ No products match your filters</div>
  </section>

  <hr>

  <footer class="site-footer">
    <div>© 2026 Yōsha Garage ★ All Rights Reserved</div>
    <div class="visitor-counter">VISITORS: <span id="vc">0</span></div>
  </footer>

  <script src="js/products-data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
